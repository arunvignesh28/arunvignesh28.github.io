name: Update Citation Counts

on:
  schedule:
    # Runs every Sunday at 03:17 UTC (off-peak to avoid S2 rate limits at midnight)
    - cron: '17 3 * * 0'
  workflow_dispatch:  # Allows manual trigger from GitHub Actions tab

jobs:
  update-citations:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit and push scholar_data.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run citation update script
        env:
          GOOGLE_SCHOLAR_ID: jIFv3pIAAAAJ
          S2_AUTHOR_ID: "2326969007"
          SCHOLAR_NAME: "Arun Vignesh Malarkkan"
          # Uncomment and add secret for higher rate limits (100 req/s vs 1 req/s):
          # SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: python .github/scripts/update_scholar.py

      - name: Commit and push updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add scholar_data.json _data/scholar.json _data/stats.json
          git diff --staged --quiet || git commit -m "chore: auto-update citation counts [skip ci]"
          git push
