<div class="photo-gallery">
  <!-- Replace the image src and alt text with your own photos -->
  <a href="/images/sample1.jpg" class="gallery-item" title="Sample Photo 1">
    <img src="/images/sample1.jpg" alt="Sample Photo 1" />
  </a>
  <a href="/images/sample2.jpg" class="gallery-item" title="Sample Photo 2">
    <img src="/images/sample2.jpg" alt="Sample Photo 2" />
  </a>
  <a href="/images/sample3.jpg" class="gallery-item" title="Sample Photo 3">
    <img src="/images/sample3.jpg" alt="Sample Photo 3" />
  </a>
  <!-- Add more images as needed -->
</div>

<script>
  if (window.jQuery && $.fn.magnificPopup) {
    $(document).ready(function() {
      $('.photo-gallery').magnificPopup({
        delegate: 'a.gallery-item',
        type: 'image',
        gallery: { enabled: true },
        image: { titleSrc: 'title' }
      });
    });
  }
</script>
